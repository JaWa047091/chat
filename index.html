<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveChat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f10;
    --surface: #1a1a1d;
    --surface2: #242428;
    --border: rgba(255,255,255,0.08);
    --text: #f0eff2;
    --muted: #888;
    --accent: #7c6af7;
    --accent-soft: rgba(124,106,247,0.15);
    --green: #3ecf8e;
    --red: #f66;
    --radius: 14px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── JOIN SCREEN ── */
  #join-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2rem;
    padding: 2rem;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,106,247,0.12) 0%, transparent 70%);
  }

  .logo {
    font-size: 2.2rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .join-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .join-card h2 {
    font-size: 1rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 0.75rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .field label {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
  }

  .avatar-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .avatar-opt {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    background: var(--surface2);
  }

  .avatar-opt:hover { transform: scale(1.1); }
  .avatar-opt.selected { border-color: var(--accent); }

  .join-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.75rem 1.5rem;
    font-family: var(--font);
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .join-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .join-btn:active { transform: translateY(0); }

  .help-text {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }

  /* ── CHAT SCREEN ── */
  #chat-screen {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }

  #chat-screen.visible { display: flex; }

  header {
    padding: 0.9rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .header-logo {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .header-logo span { color: var(--accent); }

  .room-badge {
    background: var(--accent-soft);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(124,106,247,0.3);
  }

  .online-count {
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .online-avatars {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .mini-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    border: 1.5px solid var(--bg);
  }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  .msg {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
    max-width: 75%;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.mine {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    background: var(--surface2);
    margin-bottom: 2px;
  }

  .msg-body { display: flex; flex-direction: column; gap: 0.2rem; }

  .msg-meta {
    font-size: 0.7rem;
    color: var(--muted);
    padding: 0 0.5rem;
  }

  .mine .msg-meta { text-align: right; }

  .bubble {
    background: var(--surface2);
    border-radius: 16px 16px 16px 4px;
    padding: 0.6rem 0.9rem;
    font-size: 0.92rem;
    line-height: 1.5;
    word-break: break-word;
    border: 1px solid var(--border);
  }

  .mine .bubble {
    background: var(--accent);
    border-color: transparent;
    border-radius: 16px 16px 4px 16px;
    color: #fff;
  }

  .system-msg {
    align-self: center;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 14px;
    border-radius: 20px;
    margin: 0.4rem 0;
    border: 1px solid var(--border);
  }

  /* ── INPUT BAR ── */
  #input-bar {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 1rem;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }

  .send-btn svg { pointer-events: none; }

  .leave-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: var(--font);
    font-size: 0.8rem;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .leave-btn:hover { color: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <div class="logo">Live<span>Chat</span></div>

  <div class="join-card">
    <h2>Join a room</h2>

    <div class="field">
      <label>Your name</label>
      <input type="text" id="username-input" placeholder="e.g. Jacob" maxlength="20" />
    </div>

    <div class="field">
      <label>Room code (share this with friends!)</label>
      <input type="text" id="room-input" placeholder="e.g. coolroom123" maxlength="30" />
    </div>

    <div class="field">
      <label>Pick an avatar</label>
      <div class="avatar-row" id="avatar-row"></div>
    </div>

    <button class="join-btn" onclick="joinChat()">Join room →</button>
    <p class="help-text">Anyone with the same room code can join.<br>No sign-up needed.</p>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <header>
    <div class="header-left">
      <span class="header-logo">Live<span>Chat</span></span>
      <span class="room-badge" id="room-label"></span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <div class="online-avatars" id="online-avatars"></div>
      <div class="online-count"><div class="dot"></div><span id="online-num">1</span> online</div>
      <button class="leave-btn" onclick="leaveChat()">Leave</button>
    </div>
  </header>

  <div id="messages"></div>

  <div id="input-bar">
    <input type="text" id="msg-input" placeholder="Message..." maxlength="500" />
    <button class="send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const AVATARS = ['🐱','🐶','🐸','🦊','🐼','🦁','🐯','🐺','🦄','🐻','🐧','🦋'];
let selectedAvatar = AVATARS[0];
let username = '';
let roomCode = '';
let userId = '';
let db, messagesRef, onlineRef, myOnlineRef;
let lastSender = null;

// ── AVATAR PICKER ──
const avatarRow = document.getElementById('avatar-row');
AVATARS.forEach((em, i) => {
  const el = document.createElement('div');
  el.className = 'avatar-opt' + (i === 0 ? ' selected' : '');
  el.textContent = em;
  el.onclick = () => {
    document.querySelectorAll('.avatar-opt').forEach(a => a.classList.remove('selected'));
    el.classList.add('selected');
    selectedAvatar = em;
  };
  avatarRow.appendChild(el);
});

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyDeU_6aTV2L4gglO9h7mBDG3PcanMjN1zo",
  authDomain: "new-chat-app-55e22.firebaseapp.com",
  databaseURL: "https://new-chat-app-55e22-default-rtdb.firebaseio.com",
  projectId: "new-chat-app-55e22",
  storageBucket: "new-chat-app-55e22.firebasestorage.app",
  messagingSenderId: "1051679209922",
  appId: "1:1051679209922:web:e849e53c67dc657e9bfe5b"
};

// ── JOIN ──
function joinChat() {
  username = document.getElementById('username-input').value.trim();
  roomCode = document.getElementById('room-input').value.trim().toLowerCase().replace(/\s+/g, '-');

  if (!username) { alert('Please enter your name!'); return; }
  if (!roomCode) { alert('Please enter a room code!'); return; }

  userId = 'user_' + Math.random().toString(36).slice(2, 9);

  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    startChat();
  } catch(e) {
    // Demo mode: show simulated local chat if Firebase fails
    startDemoMode();
  }
}

function startDemoMode() {
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('chat-screen').classList.add('visible');
  document.getElementById('room-label').textContent = '#' + roomCode;
  document.getElementById('online-num').textContent = '1';

  const avatarsDiv = document.getElementById('online-avatars');
  avatarsDiv.innerHTML = `<div class="mini-avatar" title="${username}">${selectedAvatar}</div>`;

  addSystemMessage(`Welcome, ${username}! You're in #${roomCode}`);
  addSystemMessage('⚠ Running in demo mode — set up Firebase for real-time multi-user chat. See the instructions below.');
  addLocalMessage('LiveChat Bot', '🤖', `Hey ${username}! To enable real-time chat with friends, you need to connect Firebase. See the setup instructions below the chat.`, false);

  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendDemoMessage();
  });
  document.querySelector('.send-btn').onclick = sendDemoMessage;
}

function sendDemoMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  addLocalMessage(username, selectedAvatar, text, true);
  input.value = '';
}

function addLocalMessage(name, avatar, text, isMe) {
  const msgs = document.getElementById('messages');
  const isNewSender = lastSender !== name;
  lastSender = name;

  const msgEl = document.createElement('div');
  msgEl.className = 'msg' + (isMe ? ' mine' : '');

  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  msgEl.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      ${isNewSender ? `<div class="msg-meta">${isMe ? 'You' : name} · ${time}</div>` : ''}
      <div class="bubble">${escHtml(text)}</div>
    </div>`;
  msgs.appendChild(msgEl);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── REAL FIREBASE CHAT ──
function startChat() {
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('chat-screen').classList.add('visible');
  document.getElementById('room-label').textContent = '#' + roomCode;

  messagesRef = db.ref(`rooms/${roomCode}/messages`);
  onlineRef = db.ref(`rooms/${roomCode}/online`);
  myOnlineRef = onlineRef.child(userId);

  myOnlineRef.set({ name: username, avatar: selectedAvatar, ts: Date.now() });
  myOnlineRef.onDisconnect().remove();

  onlineRef.on('value', snap => {
    const users = snap.val() || {};
    const count = Object.keys(users).length;
    document.getElementById('online-num').textContent = count;

    const avatarsDiv = document.getElementById('online-avatars');
    avatarsDiv.innerHTML = Object.values(users).slice(0, 5).map(u =>
      `<div class="mini-avatar" title="${escHtml(u.name)}">${u.avatar}</div>`
    ).join('');
  });

  const recentRef = messagesRef.limitToLast(100);
  recentRef.on('child_added', snap => {
    const msg = snap.val();
    renderMessage(msg);
  });

  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  addSystemMessage(`Welcome to #${roomCode}! Share this room code with friends.`);
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  if (!messagesRef) { sendDemoMessage(); return; }

  messagesRef.push({
    uid: userId,
    name: username,
    avatar: selectedAvatar,
    text: text,
    ts: Date.now()
  });
  input.value = '';
}

function renderMessage(msg) {
  const msgs = document.getElementById('messages');
  const isMe = msg.uid === userId;
  const isNewSender = lastSender !== msg.uid;
  lastSender = msg.uid;

  if (msg.type === 'system') {
    addSystemMessage(msg.text);
    return;
  }

  const time = new Date(msg.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const el = document.createElement('div');
  el.className = 'msg' + (isMe ? ' mine' : '');
  el.innerHTML = `
    <div class="msg-avatar">${msg.avatar}</div>
    <div class="msg-body">
      ${isNewSender ? `<div class="msg-meta">${isMe ? 'You' : escHtml(msg.name)} · ${time}</div>` : ''}
      <div class="bubble">${escHtml(msg.text)}</div>
    </div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSystemMessage(text) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'system-msg';
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function leaveChat() {
  if (myOnlineRef) myOnlineRef.remove();
  location.reload();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

</body>
</html>
